# =============================================================================
# demo source-of-truth — validates against SettingsDemoSchema in pipeline/demo.ts
# (canonical camelCase form). kind: settings-demo = Concept 2: hold the scenario
# state fixed, vary ONE setting (timezoneMode) between two frames.
#
# The beat: two roof inspections both booked for "10am, customer's local time" —
# Hoffman (Eastern) and Donnelly (Central). In Local the board reads in one zone
# and Donnelly looks like an 11am job; in Universal it reads 10:00am CDT and
# STACKS under Hoffman's 10:00am EDT. The zone tags are the only tell.
# =============================================================================

kind: settings-demo

story:
  slug: universal-local-timezone
  title: Universal vs Local time mode
  source: { repo: MattDreier/dispatch-schedule-ui, pr: 266, issue: 261 }
  persona: A dispatcher covering technicians across two timezones from one board.
  value: >
    Universal shows each job in the customer's own local time (zone-tagged; jobs
    at the same local hour stack at one column); Local pins the board to one zone.

env:
  baseUrl: "${DEMO_BASE_URL}"
  auth: storageState
  viewport: { width: 1440, height: 900, dpr: 2 }
  emulate: { timezone: America/New_York }
  seed:
    dataset: demo:two-zone-roofing          # identical for both frames — only the setting moves
    jobs:
      - { tech: "Marcus Chen", title: "Hoffman Roof Inspection",  zone: America/New_York, arrive: "10:00 EDT" }
      - { tech: "Priya Patel", title: "Donnelly Roof Inspection", zone: America/Chicago,  arrive: "10:00 CDT" }

# the constant: the app state both frames are shot from
scenario:
  state:
    - { action: goto, url: "/" }             # office board; the two seeded jobs are present
  focus:
    subjects:
      - { text: "Hoffman Roof Inspection" }
      - { text: "Donnelly Roof Inspection" }
    blur:
      - { css: ".job-block__customer" }      # redact customer PII in every frame

# the variable: one setting, two values (persisted in localStorage → apply directly)
compare:
  label: Time zone mode
  setting:
    key: timezoneMode
    states:
      - value: local
        label: "Local"
        apply: { localStorage: { timezoneMode: local, axisZone: America/New_York }, reload: true }
        expect:
          - { subject: "Donnelly Roof Inspection", text: "11:00am - 12:30pm" }
        capture: { shot: mode-local }        # == user frame 1

      - value: universal
        label: "Universal"
        apply: { localStorage: { timezoneMode: universal }, reload: true }
        expect:
          - { subject: "Donnelly Roof Inspection", text: "10:00am - 11:30am CDT" }
          - { subject: "Hoffman Roof Inspection",  text: "10:00am - 11:30am EDT" }
        assert:
          alignedLeft:                        # verified from event-log targetBox.x
            - { text: "Hoffman Roof Inspection" }
            - { text: "Donnelly Roof Inspection" }
        capture: { shot: mode-universal }     # == user frame 2

  # optional: film the toggle itself (in addition to the clean A/B stills)
  showToggle:
    open:
      - { action: click, target: { role: button,   name: "Account menu" } }
      - { action: click, target: { role: menuitem, name: "Settings" } }   # real path — NOT "gear"
      - { action: expect, role: dialog, name: "Configure timeline" }
    control: { role: radiogroup, name: "Time zone mode" }
    capture: { gif: toggle, seconds: 3 }

narration:
  voice: default
  script: >
    Same two roof inspections, both booked for ten a-m the customer's time. In
    Local mode the board reads in one zone, so Donnelly looks like an eleven
    o'clock job. Flip to Universal and Donnelly snaps to ten a-m Central, right
    under Hoffman's ten a-m Eastern — same hour for both customers, and the zone
    tags are the only thing telling you they're an hour apart.
