name: Render changelog video

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GEMINI_API_KEY:
        required: true
      # Needed while changelog-video is a private repo: a fine-grained PAT with
      # contents:read on MattDreier/changelog-video. Unneeded if the repo goes public.
      CHANGELOG_VIDEO_TOKEN:
        required: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out changelog-video
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/changelog-video
          path: changelog-video
          token: ${{ secrets.CHANGELOG_VIDEO_TOKEN || github.token }}

      - name: Check out target repo
        uses: actions/checkout@v4
        with:
          path: target
          token: ${{ github.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: cd changelog-video && bun install --frozen-lockfile

      - name: Ensure headless Chrome for Remotion
        run: cd changelog-video && bunx remotion browser ensure

      - name: Generate video
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cd changelog-video
          bun run generate --repo "${{ github.repository }}" --pr "${{ inputs.pr_number }}" --out ../target/changelog

      - name: Commit video to changelog/
        run: |
          cd target
          git config user.name "changelog-video[bot]"
          git config user.email "noreply@github.com"
          git add changelog/
          git commit -m "docs(changelog): release video for PR #${{ inputs.pr_number }} [skip ci]"
          git push
