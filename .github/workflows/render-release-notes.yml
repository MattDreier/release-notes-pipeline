name: Render release notes

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GEMINI_API_KEY:
        required: true
      # Fine-grained PAT on MattDreier/release-notes-pipeline. Needed for:
      # (a) checking this repo out while it is private (contents:read), and
      # (b) mirroring the finished video into its showcase/ folder (contents:write).
      # Both fall back gracefully when the secret is absent.
      RELEASE_NOTES_TOKEN:
        required: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the video + notes back to the target repo
      pull-requests: read # gather runs `gh pr view`/`gh pr diff`; a permissions block zeroes every unlisted scope
    steps:
      - name: Check out release-notes-pipeline
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/release-notes-pipeline
          path: release-notes-pipeline
          token: ${{ secrets.RELEASE_NOTES_TOKEN || github.token }}

      - name: Check out target repo
        uses: actions/checkout@v4
        with:
          path: target
          # On a pull_request event the default ref is the detached merge commit;
          # we need to be ON the default branch to commit the notes back and push.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0 # full history so the pre-push rebase can't hit a shallow wall
          token: ${{ github.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: cd release-notes-pipeline && bun install --frozen-lockfile

      - name: Ensure headless Chrome for Remotion
        run: cd release-notes-pipeline && bunx remotion browser ensure

      - name: Generate release notes (video + CHANGELOG.md + RELEASE-NOTES.md)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release-notes-pipeline
          bun run generate --repo "${{ github.repository }}" --pr "${{ inputs.pr_number }}" --target ../target

      - name: Commit release notes to target repo
        run: |
          cd target
          git config user.name "release-notes-pipeline[bot]"
          git config user.email "noreply@github.com"
          git add CHANGELOG.md release-notes/
          # Idempotent re-runs: if nothing changed, succeed without an empty commit.
          git diff --cached --quiet && { echo "no release-notes changes to commit"; exit 0; }
          git commit -m "docs(release-notes): PR #${{ inputs.pr_number }} [skip ci]"
          # Another merge may have landed during the render — rebase before pushing.
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          git push

      - name: Mirror video to showcase (optional)
        env:
          MIRROR_TOKEN: ${{ secrets.RELEASE_NOTES_TOKEN }}
        run: |
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "RELEASE_NOTES_TOKEN not set — skipping showcase mirror"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${MIRROR_TOKEN}@github.com/${{ github.repository_owner }}/release-notes-pipeline.git" mirror
          repo_name="${GITHUB_REPOSITORY#*/}"
          mkdir -p "mirror/showcase/${repo_name}"
          cp target/release-notes/*-pr${{ inputs.pr_number }}.mp4 "mirror/showcase/${repo_name}/"
          cd mirror
          git config user.name "release-notes-pipeline[bot]"
          git config user.email "noreply@github.com"
          git add showcase/
          git diff --cached --quiet && { echo "nothing new to mirror"; exit 0; }
          git commit -m "showcase: ${repo_name} PR #${{ inputs.pr_number }}"
          git pull --rebase origin main
          git push
